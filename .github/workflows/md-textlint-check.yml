name: Markdown Terminology Lint Check

on:
  pull_request:
    branches:
    - master
    paths:
    - '**.md'
    - '!.github/**'

jobs:
  get-changed-files:
    uses: ./.github/workflows/reusable_changed_files.yml
    with:
      base_ref: ${{ github.base_ref || 'master' }}

  textlint:
    needs: get-changed-files
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Base
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        repository: kingthorin/wstg
        ref: ${{ github.base_ref || 'master' }}
    - name: Checkout PR
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        ref: ${{ github.event.pull_request.head.sha }}
        path: pr
        fetch-depth: 0
    - name: Save PR Number
      env:
        PR_NUMBER: ${{ github.event.number }}
      run: echo $PR_NUMBER > pr_number
    - name: Setup Node
      uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
      with:
        node-version: 24
    - name: Cache npm Global
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
      with:
        path: ~/.npm
        key: ${{ runner.os }}-npm-global-textlint
    - name: Install Dependencies
      run: |
        npm install -g textlint
        npm install -g textlint-rule-terminology
    - name: Run textlint Check
      env:
        FILES: '${{ needs.get-changed-files.outputs.files_updated }}'
      run: |
        set -euo pipefail
        touch log.txt
        
        # Overlay PR changed files onto base (root); .github/ is excluded so base config stays
        for FILE in $FILES; do
          [ -z "$FILE" ] && continue
          mkdir -p "$(dirname "$FILE")"
          cp "pr/$FILE" "$FILE"
        done
        
        for FILE in $FILES; do
          [ -z "$FILE" ] && continue
          echo "$FILE" | grep -q '\.md$' || continue
          [ -f "$FILE" ] || continue
          textlint --config .github/configs/.textlintrc.json --fix "$FILE" | tee -a log.txt || true
        done
        if grep -q 'Incorrect term' log.txt; then exit 1; else echo -e "No terminology issues found."; fi
    - name: Show Mistakes
      if: failure()
      run: |
        cat log.txt
        cat log.txt | grep -v '✔ Fixed' | tr '✔' '✖' > mistakes.txt
        sed -i 's/✖/❌/g' mistakes.txt
    - name: Create Artifact for Comment
      if: failure()
      run: |
        echo "**The following mistakes were identified:**" > artifact.txt
        cat mistakes.txt | tee -a artifact.txt
    - name: Upload List of Mistakes
      if: failure()
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: artifact
        path: |
          artifact.txt
          pr_number
    - name: Upload PR Number on Success
      if: success()
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: artifact
        path: pr_number
