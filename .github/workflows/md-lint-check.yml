name: Markdown Lint Check

on:
  pull_request:
    branches:
    - master
    paths:
    - '**.md'
    - '!.github/**'

jobs:
  get-changed-files:
    uses: ./.github/workflows/reusable_changed_files.yml
    with:
      base_ref: ${{ github.base_ref || 'master' }}

  lint:
    needs: get-changed-files
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Base
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        repository: kingthorin/wstg
        ref: ${{ github.base_ref || 'master' }}
    - name: Checkout PR
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        ref: ${{ github.event.pull_request.head.sha }}
        path: pr
        fetch-depth: 0
    - name: Save PR Number
      env:
        PR_NUMBER: ${{ github.event.number }}
      run: echo $PR_NUMBER > pr_number
    - name: Setup Node
      uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
      with:
        node-version: 24
    - name: Cache npm Global
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
      with:
        path: ~/.npm
        key: ${{ runner.os }}-npm-global-markdownlint-cli2
    - name: Install Dependencies
      run: npm install -g markdownlint-cli2
    - name: Run Linter
      env:
        FILES: '${{ needs.get-changed-files.outputs.files_updated }}'
      shell: bash
      run: |
        set -euo pipefail
        
        # Overlay PR changed files onto base (root); .github/ is excluded so base config stays
        for FILE in $FILES; do
          [ -z "$FILE" ] && continue
          mkdir -p "$(dirname "$FILE")"
          cp "pr/$FILE" "$FILE"
        done
        
        : > lint.txt
        for FILE in $FILES; do
          [ -z "$FILE" ] && continue
          if [ -f "$FILE" ]; then
            OUTPUT="$(markdownlint-cli2 "$FILE" --config .github/configs/.markdownlint.json 2>&1)" || STATUS=$?
            if [ "${STATUS:-0}" -eq 0 ]; then
              continue
            elif [ "${STATUS:-0}" -eq 1 ]; then
              printf '%s\n' "$OUTPUT" | tee -a lint.txt
            else
              printf 'markdownlint failed for "%s" with exit code %s\n%s\n' "$FILE" "${STATUS:-0}" "$OUTPUT" >&2
              exit "${STATUS:-0}"
            fi
          fi
        done
        if [ -s lint.txt ]; then
          exit 1
        fi
    - name: Show Linting Issues
      if: failure()
      run: |
        cat lint.txt
        sed -i 's/```/triple-backtick/g' lint.txt
    - name: Create Artifact for Comment
      if: failure()
      run: |
        python3 .github/workflows/scripts/format_lint_output.py > artifact.txt
    - name: Upload List of Issues
      if: failure()
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: artifact
        path: |
          artifact.txt
          pr_number
    - name: Upload PR Number on Success
      if: success()
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: artifact
        path: pr_number
